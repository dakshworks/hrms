spring.application.name=HRMS

# ── DataSource ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=hrms_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=testuser
spring.datasource.password=Test@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────────────────────
# 64-byte Base64 secret — change in production
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.test.HRMS=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


spring.http.converters.preferred-json-mapper=jackson2
